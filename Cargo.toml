[package]
name = "sunspot_wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Pinned to beta.18 because the sample artifacts in tests/data and the
# Go-side sunspot encoder use the bincode wire format that beta.19 dropped.
acir = { git = "https://github.com/noir-lang/noir", tag = "v1.0.0-beta.18", features = ["bn254"] }

ark-bn254 = { version = "0.5", default-features = false, features = ["curve"] }
ark-ec = { version = "0.5", default-features = false }
ark-ff = { version = "0.5", default-features = false }

base64 = "0.22"
byteorder = "1.5"
ciborium = "0.2"
serde_json = "1"
thiserror = "2"
wasm-bindgen = "0.2"
