[toolchain]
# Threaded WASM requires nightly: `-C target-feature=+atomics` is nightly-only
# on wasm32-unknown-unknown, and rebuilding std with those flags needs
# `-Z build-std`.
channel = "nightly-2026-03-04"
components = ["rustfmt", "rust-analyzer", "clippy", "rust-src"]
targets = ["wasm32-unknown-unknown"]
